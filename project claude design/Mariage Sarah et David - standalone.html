document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rder:1px solid var(--accent,#C3A25C);border-radius:4px;z-index:0\"><\u002Fdiv>\n<img src=\"{{ storyA }}\" alt=\"Photo de Sarah et David\" style=\"position:relative;z-index:1;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:4px;box-shadow:0 34px 64px -34px rgba(22,35,60,.55)\">\n<\u002Fdiv>\n<div style=\"flex:1 1 360px;max-width:520px\">\n<h3 style=\"margin:0 0 10px;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,3vw,32px);color:#16233C\">La rencontre<\u002Fh3>\n<p style=\"margin:0 0 28px;font-family:'Mulish',sans-serif;font-size:clamp(15px,1.5vw,16.5px);line-height:1.9;color:#5C5647;max-width:48ch\">Tout a commencé un soir d'harmattan, à Douala, lors du mariage d'amis communs. Une conversation qui ne devait durer que quelques minutes s'est étirée jusqu'au lever du jour — et ne s'est jamais vraiment arrêtée depuis.<\u002Fp>\n<h3 style=\"margin:0 0 10px;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,3vw,32px);color:#16233C\">L'évidence<\u002Fh3>\n<p style=\"margin:0;font-family:'Mulish',sans-serif;font-size:clamp(15px,1.5vw,16.5px);line-height:1.9;color:#5C5647;max-width:48ch\">Au fil des saisons, des rires partagés et des kilomètres parcourus côte à côte, une certitude s'est imposée : nous étions faits pour avancer main dans la main.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:clamp(32px,6vw,84px);align-items:center\">\n<div style=\"flex:1 1 360px;max-width:520px;order:1\">\n<h3 style=\"margin:0 0 10px;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,3vw,32px);color:#16233C\">La demande<\u002Fh3>\n<p style=\"margin:0;font-family:'Mulish',sans-serif;font-size:clamp(15px,1.5vw,16.5px);line-height:1.9;color:#5C5647;max-width:48ch\">Face à l'océan, à Kribi, une bague au creux de la main et quelques mots tremblants ont scellé notre promesse. Un « oui » murmuré, des larmes de joie, et le début d'une vie entière à écrire ensemble.<\u002Fp>\n<\u002Fdiv>\n<div style=\"position:relative;flex:1 1 320px;max-width:500px;order:2\">\n<div style=\"position:absolute;left:-16px;bottom:-16px;right:26px;top:26px;border:1px solid var(--accent,#C3A25C);border-radius:4px;z-index:0\"><\u002Fdiv>\n<img src=\"{{ storyB }}\" alt=\"La demande en mariage\" style=\"position:relative;z-index:1;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:4px;box-shadow:0 34px 64px -34px rgba(22,35,60,.55)\">\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"programme\" data-screen-label=\"Programme\" style=\"scroll-margin-top:76px;padding:clamp(80px,11vw,150px) clamp(20px,6vw,80px);background:linear-gradient(180deg,#16233C,#0E1930);color:#F7F1E6\">\n<div style=\"max-width:720px;margin:0 auto\">\n<div data-reveal=\"\" style=\"text-align:center;margin-bottom:clamp(48px,7vw,80px)\">\n<div style=\"display:flex;align-items:center;justify-content:center;gap:14px;color:var(--accent,#C3A25C);font-family:'Mulish',sans-serif;font-weight:700;font-size:12px;letter-spacing:.3em;text-transform:uppercase\">\n<span style=\"width:30px;height:1px;background:currentColor;opacity:.6\"><\u002Fspan>Le grand jour<span style=\"width:30px;height:1px;background:currentColor;opacity:.6\"><\u002Fspan>\n<\u002Fdiv>\n<h2 style=\"margin:18px 0 12px;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(36px,5.5vw,64px);line-height:1.05;color:#F7F1E6\">Programme de la journée<\u002Fh2>\n<div style=\"font-family:'Mulish',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,241,230,.55)\">Samedi 15 novembre 2025 · Douala<\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\">\n<div style=\"display:flex;align-items:stretch\">\n<div style=\"flex:none;width:clamp(54px,10vw,72px);text-align:right;padding:2px 18px 0 0\"><div style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,3.4vw,32px);color:var(--accent,#C3A25C);line-height:1\">14<\u002Fdiv><div style=\"fo nd .2s\" style-hover=\"background:rgba(247,241,230,.18)\">\n<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><polyline points=\"15 6 9 12 15 18\"><\u002Fpolyline><\u002Fsvg>\n<\u002Fbutton>\n<button onclick=\"{{ nextPhoto }}\" aria-label=\"Suivant\" style=\"position:absolute;right:clamp(10px,3vw,34px);top:50%;transform:translateY(-50%);background:rgba(247,241,230,.08);border:1px solid rgba(247,241,230,.2);color:#F7F1E6;cursor:pointer;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s\" style-hover=\"background:rgba(247,241,230,.18)\">\n<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg>\n<\u002Fbutton>\n<figure onclick=\"{{ stop }}\" style=\"margin:0;max-width:min(560px,100%);display:flex;flex-direction:column;align-items:center;gap:16px\">\n<img src=\"{{ lb.src }}\" alt=\"{{ lb.label }}\" style=\"max-width:100%;max-height:74vh;object-fit:contain;border-radius:6px;box-shadow:0 44px 88px -34px rgba(0,0,0,.8)\">\n<figcaption style=\"display:flex;align-items:center;gap:14px;color:rgba(247,241,230,.75)\">\n<span style=\"font-family:'Mulish',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2em;text-transform:uppercase\">{{ lb.label }}<\u002Fspan>\n<span style=\"width:4px;height:4px;border-radius:50%;background:var(--accent,#C3A25C)\"><\u002Fspan>\n<span style=\"font-family:'Mulish',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2em;color:var(--accent,#C3A25C)\">{{ lbCounter }}<\u002Fspan>\n<\u002Ffigcaption>\n<\u002Ffigure>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C3A25C&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot;, &quot;options&quot;: [&quot;#C3A25C&quot;, &quot;#B76E79&quot;, &quot;#5E7D6A&quot;, &quot;#8C7B54&quot;] },\n  &quot;veil&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.72, &quot;min&quot;: 0.35, &quot;max&quot;: 0.9, &quot;step&quot;: 0.01, &quot;unit&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Hero&quot; },\n  &quot;heroVideoSrc&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Hero&quot; },\n  &quot;showCountdown&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = {\n      cd: this._compute(),\n      isMobile: (typeof window !== 'undefined' && window.innerWidth < 860),\n      scrolled: false,\n      mobileOpen: false,\n      lightbox: null,\n      name: '',\n      attending: null,\n      message: '',\n      submitted: false,\n      error: ''\n    };\n    this._onResize = this._onResize.bind(this);\n    this._onScroll = this._onScroll.bind(this);\n    this._onKey = this._onKey.bind(this);\n    this._poster = this._mkPoster();\n    this._story = [ this._mkImg('#1b2c4a', '#33507a', 'La rencontre'), this._mkImg('#5f2733', '#a86a6a', 'La demande') ];\n    var tones = [['#1c2c4a','#33507a'],['#5f2733','#9a5560'],['#2a3550','#6f7f9c'],['#4a3b2a','#a98d5c'],['#1a2740','#2c405f'],['#6E2A3C','#b07a72'],['#33304a','#7d7180'],['#243247','#4a6486']];\n    this._photos = tones.map(function(t, i){ return { src: this._mkImg(t[0], t[1], ''), label: 'Souvenir n° ' + String(i+1).padStart(2,'0'), idx: i }; }.bind(this));\n    this._qr = this._mkQR();\n    this._nav = [\n      { label:'Accueil', href:'#accueil' },\n      { label:'Notre histoire', href:'#histoire' },\n      { label:'Programme', href:'#programme' },\n      { label:'Galerie', href:'#galerie' },\n      { label:'Dress code', href:'#dresscode' }\n    ];\n  }\n\n  // === MODIFIEZ LA DATE DU MARIAGE ICI (année, mois 0-11, jour, heure, minute) ===\n  _target(){ return new Date(2025, 10, 15, 14, 0, 0); }\n\n  _compute(){\n    var diff = this._target().getTime() - Date.now();\n    var past = diff <= 0;\n    if (past) diff = 0;\n    var dd = Math.floor(diff / 86400000);\n    var hh = Math.floor(diff / 3600000) % 24;\n    var mm = Math.floor(diff / 60000) % 60;\n    var ss = Math.floor(diff / 1000) % 60;\n    var p2 = function(n){ return String(n).padStart(2, '0'); };\n    return { d: past ? '00' : String(dd), h: p2(hh), m: p2(mm), s: p2(ss), past: past };\n  }\n\n  componentDidMount(){\n    this._timer = setInterval(function(){ this.setState({ cd: this._compute() }); }.bind(this), 1000);\n    window.addEventListener('resize', this._onResize, { passive: true });\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('keydown', this._onKey);\n    this._applyVars();\n    this._initReveal();\n  }\n  componentDidUpdate(){ this._applyVars(); }\n  componentWillUnmount(){\n    clearInterval(this._timer);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('keydown', this._onKey);\n    if (this._io) this._io.disconnect();\n  }\n\n  _applyVars(){\n    var el = this.rootRef.current; if (!el) return;\n    el.style.setProperty('--accent', this.props.accent || '#C3A25C');\n    el.style.setProperty('--veil', String(this.props.veil == null ? 0.72 : this.props.veil));\n  }\n\n  _initReveal(){\n    var root = this.rootRef.current; if (!root) return;\n    var nodes = root.querySelectorAll('[data-reveal]');\n    if (!('IntersectionObserver' in window)) { nodes.forEach(function(n){ n.setAttribute('data-shown',''); }); return; }\n    var self = this;\n    this._io = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){ if (e.isIntersecting) { e.target.setAttribute('data-shown',''); self._io.unobserve(e.target); } });\n    }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });\n    nodes.forEach(function(n){ self._io.observe(n); });\n  }\n\n  _onResize(){ var m = window.innerWidth < 860; if (m !== this.state.isMobile) this.setState({ isMobile: m, mobileOpen: m ? this.state.mobileOpen : false }); }\n  _onScroll(){ var s = window.scrollY > window.innerHeight * 0.7; if (s !== this.state.scrolled) this.setState({ scrolled: s }); }\n  _onKey(e){ if (this.state.lightbox == null) return; if (e.key === 'Escape') this.setState({ lightbox: null }); else if (e.key === 'ArrowRight') this._step(1); else if (e.key === 'ArrowLeft') this._step(-1); }\n  _step(d){ var n = this._photos.length; this.setState(function(s){ return { lightbox: (s.lightbox + d + n) % n }; }); }\n\n  _submit(){\n    var nm = this.state.name.trim();\n    if (!nm) { this.setState({ error: 'name' }); return; }\n    if (!this.state.attending) { this.setState({ error: 'attend' }); return; }\n    this.setState({ submitted: true, error: '' });\n  }\n\n  _mkImg(c1, c2, tag){\n    var w = 900, h = 1120;\n    var bottom = tag ? \"<text x='50%' y='\" + (h-58) + \"' text-anchor='middle' font-family='Georgia, serif' font-style='italic' font-size='34' fill='#F7F1E6' fill-opacity='.6'>\" + tag + \"<\u002Ftext>\" : '';\n    var s = \"<svg xmlns='http://www.w3.org/2000/svg' width='\" + w + \"' height='\" + h + \"' viewBox='0 0 \" + w + \" \" + h + \"'>\"\n      + \"<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='\" + c1 + \"'/><stop offset='1' stop-color='\" + c2 + \"'/><\u002FlinearGradient>\"\n      + \"<radialGradient id='v' cx='.5' cy='.4' r='.85'><stop offset='0' stop-color='#ffffff' stop-opacity='.10'/><stop offset='1' stop-color='#000000' stop-opacity='.24'/><\u002FradialGradient><\u002Fdefs>\"\n      + \"<rect width='\" + w + \"' height='\" + h + \"' fill='url(#g)'/><rect width='\" + w + \"' height='\" + h + \"' fill='url(#v)'/>\"\n      + \"<rect x='30' y='30' width='\" + (w-60) + \"' height='\" + (h-60) + \"' fill='none' stroke='#F7F1E6' stroke-opacity='.30' stroke-width='2'/>\"\n      + \"<text x='50%' y='47%' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-style='italic' font-size='116' fill='#F7F1E6' fill-opacity='.34'>S &amp; D<\u002Ftext>\"\n      + bottom + \"<\u002Fsvg>\";\n    return 'data:image/svg+xml;utf8,' + encodeURIComponent(s);\n  }\n\n  _mkPoster(){\n    var w = 1600, h = 1000;\n    var pts = [[.12,.18,60,.12],[.22,.32,26,.22],[.34,.14,40,.16],[.5,.24,80,.10],[.62,.16,30,.20],[.72,.30,50,.14],[.84,.20,34,.18],[.9,.4,70,.09],[.16,.5,20,.16],[.44,.44,24,.14],[.68,.5,18,.18],[.8,.6,44,.10],[.3,.62,28,.12],[.56,.7,20,.14]];\n    var circles = '';\n    pts.forEach(function(p){ circles += \"<circle cx='\" + Math.round(p[0]*w) + \"' cy='\" + Math.round(p[1]*h) + \"' r='\" + p[2] + \"' fill='#C3A25C' fill-opacity='\" + p[3] + \"'/>\"; });\n    var s = \"<svg xmlns='http://www.w3.org/2000/svg' width='\" + w + \"' height='\" + h + \"' viewBox='0 0 \" + w + \" \" + h + \"'>\"\n      + \"<defs><linearGradient id='sky' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='#16233C'/><stop offset='.55' stop-color='#0E1930'/><stop offset='1' stop-color='#0A1324'/><\u002FlinearGradient>\"\n      + \"<radialGradient id='glow' cx='.5' cy='.3' r='.62'><stop offset='0' stop-color='#C3A25C' stop-opacity='.30'/><stop offset='1' stop-color='#C3A25C' stop-opacity='0'/><\u002FradialGradient><\u002Fdefs>\"\n      + \"<rect width='\" + w + \"' height='\" + h + \"' fill='url(#sky)'/><rect width='\" + w + \"' height='\" + h + \"' fill='url(#glow)'/><g>\" + circles + \"<\u002Fg><\u002Fsvg>\";\n    return 'data:image/svg+xml;utf8,' + encodeURIComponent(s);\n  }\n\n  _mkQR(){\n    var N = 21, cell = 10, quiet = 2, size = (N + quiet*2) * cell;\n    var seed = 20251115;\n    var rnd = function(){ seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };\n    var g = [];\n    for (var r = 0; r < N; r++) { g.push(new Array(N).fill(false)); }\n    var finder = function(rr, cc){ for (var i = 0; i < 7; i++) for (var j = 0; j < 7; j++){ var b = (i===0||i===6||j===0||j===6) || (i>=2&&i<=4&&j>=2&&j<=4); g[rr+i][cc+j] = b; } };\n    finder(0, 0); finder(0, N-7); finder(N-7, 0);\n    for (var k = 8; k < N-8; k++){ g[6][k] = (k % 2 === 0); g[k][6] = (k % 2 === 0); }\n    for (var a = 0; a < N; a++) for (var b2 = 0; b2 < N; b2++){\n      var inFinder = (a<8 && b2<8) || (a<8 && b2>=N-8) || (a>=N-8 && b2<8);\n      if (inFinder || a===6 || b2===6) continue;\n      if (g[a][b2]) continue;\n      g[a][b2] = rnd() > 0.52;\n    }\n    var rects = '';\n    for (var y = 0; y < N; y++) for (var x = 0; x < N; x++){ if (g[y][x]) { rects += \"<rect x='\" + ((x+quiet)*cell) + \"' y='\" + ((y+quiet)*cell) + \"' width='\" + cell + \"' height='\" + cell + \"'/>\"; } }\n    var s = \"<svg xmlns='http://www.w3.org/2000/svg' width='\" + size + \"' height='\" + size + \"' viewBox='0 0 \" + size + \" \" + size + \"'><rect width='\" + size + \"' height='\" + size + \"' fill='#F7F1E6'/><g fill='#16233C'>\" + rects + \"<\u002Fg><\u002Fsvg>\";\n    return 'data:image/svg+xml;utf8,' + encodeURIComponent(s);\n  }\n\n  renderVals(){\n    var st = this.state, self = this, scrolled = st.scrolled;\n    var navStyle = {\n      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 70,\n      display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n      padding: scrolled ? '12px clamp(18px,5vw,54px)' : '22px clamp(18px,5vw,54px)',\n      background: scrolled ? 'rgba(247,241,230,.92)' : 'transparent',\n      backdropFilter: scrolled ? 'saturate(160%) blur(12px)' : 'none',\n      WebkitBackdropFilter: scrolled ? 'saturate(160%) blur(12px)' : 'none',\n      boxShadow: scrolled ? '0 1px 0 rgba(22,35,60,.08),0 16px 34px -26px rgba(22,35,60,.5)' : 'none',\n      color: scrolled ? '#16233C' : '#F7F1E6',\n      transition: 'background .5s ease,padding .45s ease,color .45s ease,box-shadow .5s ease'\n    };\n    var tBase = { flex: '1 1 200px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', padding: '17px 16px', borderRadius: '3px', cursor: 'pointer', fontFamily: \"'Mulish',sans-serif\", fontWeight: 600, fontSize: '13px', letterSpacing: '.05em', transition: 'all .25s ease', textAlign: 'center', lineHeight: 1.2 };\n    var idle = Object.assign({}, tBase, { background: '#ffffff', color: '#16233C', border: '1px solid rgba(22,35,60,.16)' });\n    var yesStyle = st.attending === 'yes' ? Object.assign({}, tBase, { background: 'var(--accent,#C3A25C)', color: '#16233C', border: '1px solid var(--accent,#C3A25C)', boxShadow: '0 14px 28px -18px rgba(195,162,92,.9)' }) : idle;\n    var noStyle = st.attending === 'no' ? Object.assign({}, tBase, { background: '#16233C', color: '#F7F1E6', border: '1px solid #16233C' }) : idle;\n    var nm = st.name.trim();\n    var videoSrc = this.props.heroVideoSrc || '';\n\n    return {\n      rootRef: this.rootRef,\n      navStyle: navStyle,\n      nav: this._nav,\n      isMobile: st.isMobile,\n      notMobile: !st.isMobile,\n      mobileOpen: st.mobileOpen,\n      openMenu: function(){ self.setState({ mobileOpen: true }); },\n      closeMenu: function(){ self.setState({ mobileOpen: false }); },\n      poster: this._poster,\n      videoSrc: videoSrc,\n      hasVideo: !!videoSrc,\n      showCountdown: this.props.showCountdown == null ? true : this.props.showCountdown,\n      countdownIntro: st.cd.past ? 'Le grand jour est arrivé' : 'Jusqu\\u2019au grand jour',\n      cd: st.cd,\n      storyA: this._story[0],\n      storyB: this._story[1],\n      photos: this._photos.map(function(p, i){ return Object.assign({}, p, { open: function(){ self.setState({ lightbox: i }); } }); }),\n      lightboxOpen: st.lightbox != null,\n      lb: st.lightbox != null ? this._photos[st.lightbox] : { src: '', label: '' },\n      lbCounter: st.lightbox != null ? (String(st.lightbox+1).padStart(2,'0') + ' / ' + String(this._photos.length).padStart(2,'0')) : '',\n      closeLightbox: function(){ self.setState({ lightbox: null }); },\n      prevPhoto: function(e){ if (e && e.stopPropagation) e.stopPropagation(); self._step(-1); },\n      nextPhoto: function(e){ if (e && e.stopPropagation) e.stopPropagation(); self._step(1); },\n      stop: function(e){ if (e && e.stopPropagation) e.stopPropagation(); },\n      qr: this._qr,\n      name: st.name,\n      message: st.message,\n      onName: function(e){ var v = e.target.value; self.setState({ name: v, error: (st.error === 'name' && v.trim()) ? '' : st.error }); },\n      onMessage: function(e){ self.setState({ message: e.target.value }); },\n      setYes: function(){ self.setState({ attending: 'yes', error: st.error === 'attend' ? '' : st.error }); },\n      setNo: function(){ self.setState({ attending: 'no', error: st.error === 'attend' ? '' : st.error }); },\n      yesStyle: yesStyle,\n      noStyle: noStyle,\n      submit: function(){ self._submit(); },\n      errName: st.error === 'name',\n      errAttend: st.error === 'attend',\n      submitted: st.submitted,\n      notSubmitted: !st.submitted,\n      confTitle: st.attending === 'no' ? 'Merci pour votre réponse' : 'Votre présence est confirmée',\n      confMsg: st.attending === 'no'\n        ? (nm + ', votre présence nous manquera. Nous penserons très fort à vous le 15 novembre.')\n        : (nm + ', nous avons hâte de célébrer ce grand jour à vos côtés, le 15 novembre à Douala.'),\n      resetForm: function(){ self.setState({ submitted: false }); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
